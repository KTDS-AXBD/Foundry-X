name = "foundry-x-api"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

[vars]
GITHUB_REPO = "KTDS-AXBD/Foundry-X"

# Local development
[env.dev]
name = "foundry-x-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

# Sprint 8: KV Cache
[[kv_namespaces]]
binding = "CACHE"
id = "7e5290234e744f9193f61d1b3800d041"

# Sprint 8: Workers AI
[ai]
binding = "AI"
