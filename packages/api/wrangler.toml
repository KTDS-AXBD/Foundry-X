name = "foundry-x-api"
account_id = "b6c06059b413892a92f150e5ca496236"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

[vars]
GITHUB_REPO = "KTDS-AXBD/Foundry-X"
ENVIRONMENT = "production"

# Local development
[env.dev]
name = "foundry-x-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

# F57: Staging environment
[env.staging]
name = "foundry-x-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

[env.staging.vars]
GITHUB_REPO = "KTDS-AXBD/Foundry-X"
ENVIRONMENT = "staging"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "030b30d47a98485ea3af95b3347163d6"

[env.staging.ai]
binding = "AI"

# Sprint 26: Service Bindings
[[services]]
binding = "DX_WORKER"
service = "discovery-x-radar-worker"
environment = "production"

[[services]]
binding = "AIF_WORKER"
service = "ai-foundry-svc-gateway"
environment = "production"

# Sprint 8: KV Cache
[[kv_namespaces]]
binding = "CACHE"
id = "030b30d47a98485ea3af95b3347163d6"

# Sprint 8: Workers AI
[ai]
binding = "AI"
