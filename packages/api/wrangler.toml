name = "foundry-x-api"
account_id = "b6c06059b413892a92f150e5ca496236"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

[vars]
GITHUB_REPO = "KTDS-AXBD/Foundry-X"
ENVIRONMENT = "production"
# 테스트 공유 Org — 설정 시 신규 가입자는 개인 Org 대신 이 Org에 소속. 해제하려면 이 줄 삭제 후 redeploy
# org_452b33c1 = 실제 "AX BD's Org" (slug: ktds-axbd, biz_items 3개 + 기존 멤버 9명)
DEFAULT_SHARED_ORG_ID = "org_452b33c1"

# Local development
[env.dev]
name = "foundry-x-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

# F57: Staging environment
[env.staging]
name = "foundry-x-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

[env.staging.vars]
GITHUB_REPO = "KTDS-AXBD/Foundry-X"
ENVIRONMENT = "staging"
DEFAULT_SHARED_ORG_ID = "org_452b33c1"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "030b30d47a98485ea3af95b3347163d6"

[env.staging.ai]
binding = "AI"

# Sprint 27: Cron Trigger — Reconciliation every 6 hours
[triggers]
crons = ["0 */6 * * *"]

# Sprint 26: Service Bindings
## Sprint 26: Service Bindings — disabled until target Workers are deployed
## [[services]]
## binding = "DX_WORKER"
## service = "discovery-x-radar-worker"
##
## [[services]]
## binding = "AIF_WORKER"
## service = "ai-foundry-svc-gateway"

# F546 Sprint 298: fx-decode-bridge — Decode-X Service Bindings
# svc-extraction (구조 추출 엔진) + svc-ontology (Neo4j KG)
# 동일 계정(ktds-axbd) 확인 완료 (2026-04-16)
[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[services]]
binding = "SVC_SKILL"
service = "svc-skill"

# F441: R2 File Storage (Sprint 213)
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "foundry-x-files"

[[env.dev.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "foundry-x-files-dev"

[[env.staging.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "foundry-x-files-staging"

# Sprint 8: KV Cache
[[kv_namespaces]]
binding = "CACHE"
id = "030b30d47a98485ea3af95b3347163d6"

# Sprint 8: Workers AI
[ai]
binding = "AI"

# TD-36 (2026-04-21): Explicit production environment section (top-level mirror).
# top-level config is retained for backward compatibility with current CI/CD
# (`wrangler deploy` with no --env flag continues to use top-level).
# [env.production] enables future transition to `wrangler deploy --env production`
# and restores environment isolation parity with [env.dev] / [env.staging].
[env.production]
name = "foundry-x-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "foundry-x-db"
database_id = "6338688e-b050-4835-98a2-7101f9215c76"
migrations_dir = "src/db/migrations"

[env.production.vars]
GITHUB_REPO = "KTDS-AXBD/Foundry-X"
ENVIRONMENT = "production"
DEFAULT_SHARED_ORG_ID = "org_452b33c1"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "030b30d47a98485ea3af95b3347163d6"

[env.production.ai]
binding = "AI"

[[env.production.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "foundry-x-files"

[[env.production.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[env.production.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[env.production.services]]
binding = "SVC_SKILL"
service = "svc-skill"

[env.production.triggers]
crons = ["0 */6 * * *"]
