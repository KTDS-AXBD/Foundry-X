name = "fx-gateway"
account_id = "b6c06059b413892a92f150e5ca496236"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# F517: Service Binding — 기존 API Worker (잔여 도메인)
[[services]]
binding = "MAIN_API"
service = "foundry-x-api"

# F523: Service Binding — Discovery Worker (활성화, 하드와이어)
[[services]]
binding = "DISCOVERY"
service = "fx-discovery"

# Local development
[env.dev]
name = "fx-gateway-dev"

[[env.dev.services]]
binding = "MAIN_API"
service = "foundry-x-api-dev"

[[env.dev.services]]
binding = "DISCOVERY"
service = "fx-discovery-dev"
