services:
  builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.builder
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    volumes:
      # 로컬 빌드 산출물 + node_modules + templates 마운트
      - ..:/app
    restart: unless-stopped
    networks:
      - builder-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"

networks:
  builder-net:
    driver: bridge
