<!-- Component: bottom-note
     Usage: 다수 섹션 하단 — 요약/보충 메모 (좌측 검정 보더)
     Variables: {{content}}
-->
<style>
  .bottom-note {
    margin-top: 48px; padding: 24px 32px; background: var(--white); border-radius: var(--card-radius-sm);
    border-left: 3px solid var(--black); font-size: 15px; color: var(--gray-700); line-height: 1.7;
  }
</style>

<div class="bottom-note fade-in">
  {{content}}
</div>
