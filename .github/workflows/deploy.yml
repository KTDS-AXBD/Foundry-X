name: Deploy to Cloudflare
on:
  push:
    branches: [master]
    # 메타 전용 커밋(SPEC.md·docs·.claude)은 workflow 트리거 제외
    # → Sprint autopilot 메타 커밋이 코드 deploy run을 cancel하지 않음
    paths-ignore:
      - 'SPEC.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '.claude/**'
  workflow_dispatch:

# cancel-in-progress: false — 2중 방어
# paths-ignore를 통과한 커밋이라도 진행 중인 deploy run을 취소하지 않음
# (D1 migration idempotent, Pages/Workers deploy last-write-wins)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 변경 경로 감지 — skip/run 판단
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      code: ${{ steps.filter.outputs.code }}
      msa: ${{ steps.filter.outputs.msa }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'packages/**/*.ts'
              - 'packages/**/*.tsx'
              - 'packages/**/package.json'
              - 'pnpm-lock.yaml'
            api:
              - 'packages/api/**'
              - 'packages/shared/**'
              - 'packages/harness-kit/**'
            web:
              - 'packages/web/**'
              - 'packages/shared/**'
            msa:
              - 'packages/fx-gateway/**'
              - 'packages/fx-discovery/**'

  # 코드 변경 시에만 test 실행 (SPEC.md, scripts, docs 변경은 skip)
  test:
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck lint test

  # Production deploy — API (코드 변경 시에만)
  deploy-api:
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    needs: [test, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @foundry-x/shared build
      - run: pnpm --filter @foundry-x/harness-kit build
      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/api
          command: d1 migrations apply foundry-x-db --remote
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/api
          secrets: |
            MARKER_PROJECT_ID
        env:
          MARKER_PROJECT_ID: ${{ secrets.VITE_MARKER_PROJECT_ID }}

  # Production deploy — Web (코드 변경 시에만)
  deploy-web:
    if: |
      always() &&
      (needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    needs: [test, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @foundry-x/shared build
      - run: pnpm --filter @foundry-x/web build
        env:
          VITE_MARKER_PROJECT_ID: ${{ secrets.VITE_MARKER_PROJECT_ID }}
          VITE_TINA_CLIENT_ID: ${{ secrets.VITE_TINA_CLIENT_ID }}
      - name: TinaCMS build (admin UI → dist/admin/)
        working-directory: packages/web
        continue-on-error: true
        run: |
          npx tinacms build || echo "⚠️ TinaCMS build failed — continuing"
          cp -r public/admin/* dist/admin/ 2>/dev/null || true
        env:
          VITE_TINA_CLIENT_ID: ${{ secrets.VITE_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      - name: Restore _redirects + _headers (SPA 404 수정)
        working-directory: packages/web
        run: |
          cp public/_redirects dist/_redirects
          cp public/_headers dist/_headers
          cp dist/index.html dist/404.html
          grep -q '/\*.*index.html.*200' dist/_redirects && echo "✅ SPA catch-all OK" || (echo "❌ SPA catch-all MISSING" && exit 1)
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/web
          command: pages deploy dist --project-name=foundry-x-web --commit-dirty=true --commit-message="deploy"
          packageManager: pnpm

  # Production deploy — MSA Workers (fx-discovery + fx-gateway)
  deploy-msa:
    if: |
      always() &&
      (needs.changes.outputs.msa == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    needs: [test, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # wrangler는 packages/api에만 devDependency. 다른 패키지에서는 `pnpm exec` 미해결.
      # → 상대 경로로 packages/api의 wrangler 직접 호출.
      - name: Deploy fx-discovery Worker
        working-directory: packages/fx-discovery
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ../api/node_modules/.bin/wrangler deploy
      - name: Deploy fx-gateway Worker
        working-directory: packages/fx-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ../api/node_modules/.bin/wrangler deploy

  smoke-test:
    if: |
      always() &&
      !contains(needs.*.result, 'failure')
    needs: [deploy-api, deploy-web, deploy-msa]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: bash scripts/smoke-test.sh
        env:
          API_URL: https://foundry-x-api.ktds-axbd.workers.dev
          WEB_URL: https://fx.minu.best
