name: Deploy to Cloudflare
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  # 변경 경로 감지 — deploy job들의 skip/run 판단에 사용
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/shared/**'
            api:
              - 'packages/api/**'
              - 'packages/shared/**'
            web:
              - 'packages/web/**'
              - 'packages/shared/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck lint test

  # F57: Staging deploy (PR only)
  deploy-staging:
    if: github.event_name == 'pull_request'
    needs: [test, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @foundry-x/shared build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/api
          command: deploy --env staging

  # Production deploy (master push) — API 변경 시에만
  deploy-api:
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch')
    needs: [test, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @foundry-x/shared build
      # D1 마이그레이션을 deploy 전에 적용 (미적용 마이그레이션이 있을 때만 실행)
      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/api
          command: d1 migrations apply foundry-x-db --remote
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/api

  # Production deploy (master push) — Web 변경 시에만
  deploy-web:
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch')
    needs: [test, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @foundry-x/shared build
      - run: pnpm --filter @foundry-x/web build
        env:
          VITE_MARKER_PROJECT_ID: ${{ secrets.VITE_MARKER_PROJECT_ID }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/web
          command: pages deploy dist --project-name=foundry-x-web --commit-dirty=true --commit-message="deploy"
          packageManager: pnpm

  smoke-test:
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure')
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: bash scripts/smoke-test.sh
        env:
          API_URL: https://foundry-x-api.ktds-axbd.workers.dev
          WEB_URL: https://fx.minu.best

  # F78: Production E2E — Playwright 브라우저 테스트 (배포 후)
  # non-blocking: 실패해도 배포 성공 상태 유지 (안정화 후 제거)
  prod-e2e:
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.smoke-test.result == 'success'
    continue-on-error: true
    needs: smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm -F @foundry-x/web exec playwright install --with-deps chromium
      - name: Run production E2E tests
        run: pnpm -F @foundry-x/web e2e:prod
        env:
          PROD_WEB_URL: https://fx.minu.best
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: prod-e2e-report
          path: packages/web/playwright-report/
          retention-days: 14
