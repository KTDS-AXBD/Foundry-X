name: Priority Change Audit (F507)

# F507 — Issue Priority 라벨 변경을 감지해서 docs/priority-history/ 에 자동 기록
on:
  issues:
    types: [labeled, unlabeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  record:
    # bot actor 제외 — 무한 루프 방지
    if: github.actor != 'github-actions[bot]' && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Check label pattern
        id: check
        env:
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          if [[ "$LABEL_NAME" =~ ^P[0-3]- ]]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
            # P0-critical → P0
            P_CODE=$(echo "$LABEL_NAME" | grep -oE '^P[0-3]')
            echo "p_code=$P_CODE" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.match == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract F-item
        if: steps.check.outputs.match == 'true'
        id: extract
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          F_NUM=$(echo "$TITLE" | grep -oE '^\[F[0-9]+\]' | tr -d '[]' || echo "")
          if [ -z "$F_NUM" ]; then
            echo "No F-item in title; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "f_num=$F_NUM" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Record priority change
        if: steps.check.outputs.match == 'true' && steps.extract.outputs.skip == 'false'
        env:
          F_NUM: ${{ steps.extract.outputs.f_num }}
          NEW_P: ${{ steps.check.outputs.p_code }}
          ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.actor }}
        run: |
          # labeled=추가, unlabeled=제거 → 추가만 기록 (제거는 교체의 한 축)
          if [ "$ACTION" != "labeled" ]; then
            echo "unlabeled event skipped (will be captured by labeled pair)"
            exit 0
          fi
          # OLD_P: history 파일의 최신 NEW 값 조회, 없으면 P?
          HIST="docs/priority-history/${F_NUM}.md"
          OLD_P="P?"
          if [ -f "$HIST" ]; then
            LAST=$(grep -E '^\| 20[0-9]{2}-' "$HIST" | tail -1 | awk -F'|' '{print $3}' | grep -oE 'P[0-3]' | tail -1 || echo "")
            [ -n "$LAST" ] && OLD_P="$LAST"
          fi
          if [ "$OLD_P" = "$NEW_P" ]; then
            echo "OLD == NEW ($NEW_P); no change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/priority/record-change.sh "$F_NUM" "$OLD_P" "$NEW_P" \
            "GitHub label sync by ${ACTOR}" --no-issue

      - name: Create PR
        if: steps.check.outputs.match == 'true' && steps.extract.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(priority): ${{ steps.extract.outputs.f_num }} → ${{ steps.check.outputs.p_code }}"
          branch: priority-history/${{ steps.extract.outputs.f_num }}
          title: "chore(priority): ${{ steps.extract.outputs.f_num }} → ${{ steps.check.outputs.p_code }}"
          body: |
            Auto-generated by Priority Change Audit workflow (F507).

            - Issue: #${{ github.event.issue.number }}
            - Actor: ${{ github.actor }}
            - Label: ${{ github.event.label.name }}
          base: master
          delete-branch: true
