<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}} | KT DS</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  /* ===== RESET & ROOT ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* ── AXIS Design System Token Mapping (v0.4) ── */
    /* Gray Scale — @axis-ds/tokens v1.1.1 */
    --black: #111827;       /* axis-gray-900 */
    --gray-900: #111827;    /* axis-gray-900 */
    --gray-800: #1F2937;    /* axis-gray-800 */
    --gray-700: #374151;    /* axis-gray-700 */
    --gray-600: #4B5563;    /* axis-gray-600 */
    --gray-500: #6B7280;    /* axis-gray-500 */
    --gray-400: #9CA3AF;    /* axis-gray-400 */
    --gray-300: #D1D5DB;    /* axis-gray-300 */
    --gray-200: #E5E7EB;    /* axis-gray-200 */
    --gray-100: #F3F4F6;    /* axis-gray-100 */
    --gray-50: #F9FAFB;     /* axis-gray-50 */
    --white: #FFFFFF;

    /* Color: Data Visualization — AXIS aligned */
    --red: #DC2626;         /* axis-red-600 */
    --orange: #EA580C;      /* axis-orange-600 */
    --green: #16A34A;       /* axis-green-600 */
    --amber: #A16207;       /* axis-yellow-700 */
    --yellow: #FACC15;      /* axis-yellow-400 */

    /* Layout */
    --max-width: 1200px;
    --nav-height: 56px;
    --card-radius: 16px;
    --card-radius-sm: 12px;

    /* ── Foundry-X Custom Tokens ── */
    --fx-font-family: 'Pretendard', ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
    --fx-font-size-subsection: 1.375rem;
    --fx-lineHeight-body: 1.7;
    --fx-tracking-tightest: -0.04em;
    --fx-tracking-tight: -0.02em;
    --fx-tracking-slight: -0.01em;
    --fx-tracking-wide: 0.08em;
    --fx-tracking-widest: 0.12em;
    --fx-shadow-subtle: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    --fx-shadow-hover: 0 8px 20px rgba(0,0,0,0.06);
    --fx-transition-fast: 0.2s ease;
    --fx-transition-normal: 0.3s ease;
    --fx-transition-slow: 0.7s ease;
    --fx-radius-sm: 0.25rem;
    --fx-radius-md: 0.5rem;
    --fx-radius-lg: 0.75rem;
    --fx-radius-xl: 1rem;
    --fx-radius-2xl: 1.25rem;
    --fx-radius-full: 9999px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--fx-font-family);
    color: var(--black);
    background: var(--white);
    line-height: var(--fx-lineHeight-body);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== TYPOGRAPHY ===== */
  .section-label {
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: var(--fx-tracking-wide);
    color: var(--gray-500); margin-bottom: 12px;
  }
  .section-title {
    font-size: 36px; font-weight: 800; letter-spacing: var(--fx-tracking-tight); line-height: 1.3;
    margin-bottom: 20px; color: var(--black);
  }
  .section-sub {
    font-size: 17px; color: var(--gray-600); line-height: var(--fx-lineHeight-body); max-width: 680px;
  }

  /* ===== LAYOUT ===== */
  section {
    padding: 120px 40px 80px;
    max-width: var(--max-width);
    margin: 0 auto;
  }
  section.full-width {
    max-width: 100%;
    padding-left: 0;
    padding-right: 0;
  }

  /* ===== FADE-IN ANIMATION ===== */
  .fade-in {
    opacity: 0; transform: translateY(30px);
    transition: opacity var(--fx-transition-slow), transform var(--fx-transition-slow);
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* ===== COMMON CARD ===== */
  .card {
    padding: 28px 24px;
    border: 1px solid var(--gray-200);
    border-radius: var(--card-radius);
    background: var(--white);
  }
  .card.highlight {
    border-color: var(--black);
    border-width: 2px;
  }

  /* ===== TABLE ===== */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 24px;
  }
  .compare-table th, .compare-table td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--gray-200);
    font-size: 14px;
  }
  .compare-table th {
    font-weight: 600;
    color: var(--gray-600);
    background: var(--gray-50);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: var(--fx-tracking-wide);
  }

  /* ===== BADGE ===== */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
  }
  .badge.green { background: #F0FDF4; color: var(--green); }   /* axis-green-50 */
  .badge.red { background: #FEF2F2; color: var(--red); }     /* axis-red-50 */
  .badge.orange { background: #FFF7ED; color: var(--orange); }/* axis-orange-50 */
  .badge.amber { background: #FEFCE8; color: var(--amber); }  /* axis-yellow-50 */
  .badge.black { background: var(--black); color: var(--white); }
  .badge.gray { background: var(--gray-100); color: var(--gray-600); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    section { padding: 80px 20px 60px; }
    .section-title { font-size: 28px; }
    nav ul { display: none; }
  }

  @media (max-width: 600px) {
    section { padding: 60px 16px 40px; }
    .section-title { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- COMPONENT: nav -->
<!-- COMPONENT: hero -->
<!-- COMPONENT: sections (조합) -->
<!-- COMPONENT: footer (선택) -->

<script>
// IntersectionObserver — 스크롤 시 fade-in 애니메이션
document.addEventListener('DOMContentLoaded', () => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
});
</script>
</body>
</html>
